<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Alpha Assistant</title>
  <script>
    // Force-clear old service workers and caches on every load
    (function(){
      if('serviceWorker' in navigator){
        navigator.serviceWorker.getRegistrations().then(function(regs){
          regs.forEach(function(r){ r.unregister(); });
        });
      }
      if('caches' in window){
        caches.keys().then(function(keys){
          keys.forEach(function(k){ caches.delete(k); });
        });
      }
    })();
  </script>
  <link rel="manifest" href="/Alpha-new/manifest.json" />
  <link rel="icon" type="image/png" href="/Alpha-new/favicon-bull.png" />
  <link rel="apple-touch-icon" href="/Alpha-new/apple-touch-icon.png" />
  <!-- Warm the default orb character + pokeball so they appear instantly. -->
  <link rel="preload" as="fetch" type="model/gltf-binary" href="/Alpha-new/ar-models/pikachu.glb" crossorigin="anonymous" />
  <link rel="preload" as="fetch" type="model/gltf-binary" href="/Alpha-new/ar-models/pokeball.glb" crossorigin="anonymous" />
  <!-- Puter.js: free, keyless access to GPT-4o / Claude / Gemini (user-pays model) -->
  <script async src="https://js.puter.com/v2/"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Assistant:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <!-- ── Intro: alien awakening video → alien-door close → reveal the app ── -->
  <div id="introOverlay">
    <video id="introVid" muted playsinline autoplay preload="auto" src="/Alpha-new/intro-alien.mp4"></video>
    <div class="intro-door l"></div>
    <div class="intro-door r"></div>
    <div class="intro-seam"></div>
    <button id="introSkip" type="button">דלג ⏭</button>
  </div>
  <style>
    #introOverlay{position:fixed;inset:0;z-index:99999;background:#02030a;overflow:hidden;transition:opacity .5s ease}
    #introVid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity .45s ease,transform 1.6s ease}
    .intro-door{position:absolute;top:0;bottom:0;width:51%;z-index:2;
      background:
        repeating-linear-gradient(180deg,rgba(255,255,255,.03) 0 2px,transparent 2px 26px),
        linear-gradient(90deg,#0a1626,#060c18 60%,#02060f);
      transition:transform .8s cubic-bezier(.76,0,.24,1);will-change:transform}
    .intro-door.l{left:0;transform:translateX(-101%);box-shadow:inset -2px 0 0 rgba(111,211,240,.5),inset -16px 0 40px rgba(111,211,240,.12)}
    .intro-door.r{right:0;transform:translateX(101%);box-shadow:inset 2px 0 0 rgba(255,90,80,.5),inset 16px 0 40px rgba(255,90,80,.12)}
    .intro-door::after{content:"";position:absolute;top:50%;width:60px;height:60px;transform:translateY(-50%);
      background:radial-gradient(circle,rgba(111,211,240,.25),transparent 70%)}
    .intro-door.l::after{right:-30px} .intro-door.r::after{left:-30px;background:radial-gradient(circle,rgba(255,90,80,.25),transparent 70%)}
    .intro-seam{position:absolute;top:0;bottom:0;left:50%;width:3px;transform:translateX(-50%) scaleY(0);z-index:3;
      background:linear-gradient(180deg,transparent,#6FD3F0,#fff,#FF5A50,transparent);
      box-shadow:0 0 24px 6px rgba(255,255,255,.7);transition:transform .35s ease,opacity .4s ease;opacity:0}
    #introSkip{position:absolute;bottom:max(22px,env(safe-area-inset-bottom));right:22px;z-index:4;
      background:rgba(8,12,20,.6);border:1px solid rgba(111,211,240,.4);color:#cfe8f5;
      padding:8px 16px;border-radius:999px;font-family:Assistant,system-ui,sans-serif;font-size:14px;cursor:pointer;backdrop-filter:blur(6px)}
    /* CLOSING: doors slide shut, seam flares */
    #introOverlay.closing .intro-door.l{transform:translateX(0)}
    #introOverlay.closing .intro-door.r{transform:translateX(0)}
    #introOverlay.closing .intro-seam{transform:translateX(-50%) scaleY(1);opacity:1}
    #introOverlay.closing #introSkip{opacity:0;pointer-events:none}
    /* OPENING: background goes transparent, video fades, doors part to reveal the app */
    #introOverlay.opening{background:transparent;pointer-events:none}
    #introOverlay.opening #introVid{opacity:0}
    #introOverlay.opening .intro-door.l{transform:translateX(-101%)}
    #introOverlay.opening .intro-door.r{transform:translateX(101%)}
    #introOverlay.opening .intro-seam{opacity:0}
    #introOverlay.gone{opacity:0}
    @media (prefers-reduced-motion: reduce){ #introVid{display:none} }
  </style>
  <script>
    (function(){
      var ov=document.getElementById('introOverlay'); if(!ov) return;
      var vid=document.getElementById('introVid'); var done=false;
      function finish(){
        if(done) return; done=true;
        ov.classList.add('closing');                 // doors slam shut + seam flash
        setTimeout(function(){ ov.classList.add('opening'); }, 820);   // part doors → reveal app
        setTimeout(function(){ ov.classList.add('gone'); }, 1700);
        setTimeout(function(){ ov.parentNode && ov.parentNode.removeChild(ov); }, 2250);
      }
      document.getElementById('introSkip').addEventListener('click', finish);
      if(vid){
        vid.addEventListener('ended', finish);
        vid.addEventListener('error', finish);
        var pr=vid.play && vid.play();
        if(pr && pr.catch) pr.catch(function(){ /* autoplay blocked: skip button / fallback handles it */ });
        setTimeout(finish, 16000);   // hard fallback so the app never gets stuck behind the intro
      } else { finish(); }
    })();
  </script>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
