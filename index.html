<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Alpha Assistant</title>
  <script>
    // Force-clear old service workers and caches on every load
    (function(){
      if('serviceWorker' in navigator){
        navigator.serviceWorker.getRegistrations().then(function(regs){
          regs.forEach(function(r){ r.unregister(); });
        });
      }
      if('caches' in window){
        caches.keys().then(function(keys){
          keys.forEach(function(k){ caches.delete(k); });
        });
      }
    })();
  </script>
  <link rel="manifest" href="/Alpha-new/manifest.json" />
  <link rel="icon" type="image/png" href="/Alpha-new/favicon-bull.png" />
  <link rel="apple-touch-icon" href="/Alpha-new/apple-touch-icon.png" />
  <!-- Warm the default orb character + pokeball so they appear instantly. -->
  <link rel="preload" as="fetch" type="model/gltf-binary" href="/Alpha-new/ar-models/pikachu.glb" crossorigin="anonymous" />
  <link rel="preload" as="fetch" type="model/gltf-binary" href="/Alpha-new/ar-models/pokeball.glb" crossorigin="anonymous" />
  <!-- Puter.js: free, keyless access to GPT-4o / Claude / Gemini (user-pays model) -->
  <script async src="https://js.puter.com/v2/"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Assistant:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <!-- ── Intro: full-screen alien on black → face scan → ACCESS GRANTED →
            dimension entry → only then the panels appear ── -->
  <div id="introOverlay">
    <video id="introVid" muted playsinline autoplay preload="auto" src="/Alpha-new/intro-alien.mp4"></video>
    <div class="intro-scan"><span class="scan-bar"></span><span class="scan-txt" id="scanTxt">מאתחל סורק…</span></div>
    <div class="intro-grant">
      <div class="grant-ring"></div>
      <div class="grant-check">✓</div>
      <div class="grant-title">זוהו פנים — הגישה אושרה</div>
      <div class="grant-sub">ALPHA · נכנס למערכת</div>
    </div>
    <div class="intro-flash"></div>
    <div class="intro-vault" aria-hidden="true">
      <svg viewBox="0 0 400 400">
        <circle class="v-ring v-outer" cx="200" cy="200" r="186"/>
        <circle class="v-ring v-teeth" cx="200" cy="200" r="170"/>
        <circle class="v-ring v-mid" cx="200" cy="200" r="138"/>
        <g class="v-spokes">
          <line x1="200" y1="58" x2="200" y2="122"/><line x1="200" y1="278" x2="200" y2="342"/>
          <line x1="58" y1="200" x2="122" y2="200"/><line x1="278" y1="200" x2="342" y2="200"/>
          <line x1="101" y1="101" x2="146" y2="146"/><line x1="254" y1="254" x2="299" y2="299"/>
          <line x1="299" y1="101" x2="254" y2="146"/><line x1="101" y1="299" x2="146" y2="254"/>
        </g>
        <circle class="v-core" cx="200" cy="200" r="92"/>
        <circle class="v-core2" cx="200" cy="200" r="70"/>
      </svg>
      <div class="v-text">נכנס למערכת…</div>
    </div>
    <button id="introSkip" type="button">דלג ⏭</button>
  </div>
  <style>
    /* keep EVERYTHING out until the intro completes — nothing shows before reveal */
    html.booting #app{ opacity:0 !important; }
    html.booting .welcome-overlay{ opacity:0 !important; pointer-events:none !important; }
    body.revealed .app{ animation: app-in .9s ease both; }
    @keyframes app-in{ from{opacity:0} to{opacity:1} }   /* opacity only — no layout shift */
    #introOverlay{position:fixed;inset:0;z-index:99999;background:#000;overflow:hidden;transition:opacity .6s ease,transform .7s ease}
    #introVid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;transition:opacity .5s ease}
    /* face scan */
    .intro-scan{position:absolute;inset:0;z-index:2;opacity:0;transition:opacity .3s;pointer-events:none}
    #introOverlay.scanning .intro-scan{opacity:1}
    .scan-bar{position:absolute;left:0;right:0;top:8%;height:3px;background:linear-gradient(90deg,transparent,#F7E8C0,#E4BC63,transparent);box-shadow:0 0 26px 7px rgba(228,188,99,.6)}
    #introOverlay.scanning .scan-bar{animation:scan-sweep 1.2s ease-in-out}
    @keyframes scan-sweep{0%{top:10%}100%{top:90%}}
    .scan-txt{position:absolute;bottom:15%;left:0;right:0;text-align:center;color:#F7E8C0;font-family:'Space Grotesk',monospace,sans-serif;letter-spacing:3px;font-size:15px;text-shadow:0 0 12px rgba(228,188,99,.7)}
    /* access granted */
    .intro-grant{position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;opacity:0;transform:scale(.92);transition:opacity .4s ease,transform .4s ease;pointer-events:none}
    #introOverlay.granted .intro-grant{opacity:1;transform:scale(1)}
    .grant-ring{position:absolute;width:210px;height:210px;border:2px solid rgba(228,188,99,.55);border-radius:50%;box-shadow:0 0 44px rgba(228,188,99,.4),inset 0 0 44px rgba(228,188,99,.18);animation:grant-pulse 1s ease infinite}
    @keyframes grant-pulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.08);opacity:1}}
    .grant-check{font-size:64px;line-height:1;color:#F7E8C0;text-shadow:0 0 30px rgba(228,188,99,.9)}
    .grant-title{color:#fff;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:21px;letter-spacing:1px;text-shadow:0 0 16px rgba(228,188,99,.6)}
    .grant-sub{color:#E4BC63;font-size:13px;letter-spacing:5px}
    /* dimension entry: white warp flash + overlay zoom */
    .intro-flash{position:absolute;inset:0;z-index:4;background:radial-gradient(circle,rgba(247,232,192,.55),rgba(228,188,99,.18) 40%,transparent 68%);opacity:0;pointer-events:none}
    #introOverlay.entering .intro-flash{animation:flash-warp .6s ease forwards}
    @keyframes flash-warp{0%{opacity:0;transform:scale(.5)}45%{opacity:.65}100%{opacity:0;transform:scale(1.6)}}
    #introOverlay.entering #introVid,#introOverlay.entering .intro-grant{opacity:0}
    #introOverlay.gone{opacity:0}
    /* ── Vault door: spinning gear rings + blue LED, then zoom inside ── */
    .intro-vault{position:absolute;inset:0;z-index:4;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;opacity:0;transition:opacity .45s ease;pointer-events:none}
    #introOverlay.vaulting .intro-vault{opacity:1}
    .intro-vault svg{width:min(74vh,560px);height:min(74vh,560px);filter:drop-shadow(0 0 26px rgba(63,180,255,.55))}
    .v-ring{fill:none}
    .v-outer{stroke:#1e4a6b;stroke-width:22}
    .v-teeth{stroke:#3fb8ff;stroke-width:16;stroke-dasharray:5 16;opacity:.88}
    .v-mid{stroke:#7fd8ff;stroke-width:2;stroke-dasharray:3 10;opacity:.7}
    .v-core{fill:rgba(8,26,44,.5);stroke:#3fb8ff;stroke-width:3}
    .v-core2{fill:none;stroke:rgba(127,216,255,.6);stroke-width:1.5}
    .v-spokes line{stroke:#3fb8ff;stroke-width:3;opacity:.65}
    .v-teeth,.v-mid,.v-spokes{transform-box:fill-box;transform-origin:center}
    #introOverlay.vaulting .v-teeth{animation:v-spin 5s linear infinite}
    #introOverlay.vaulting .v-mid{animation:v-spin 3.4s linear infinite reverse}
    #introOverlay.vaulting .v-spokes{animation:v-spin 7s linear infinite}
    @keyframes v-spin{to{transform:rotate(360deg)}}
    .v-text{color:#9fdcff;font-family:'Space Grotesk',monospace,sans-serif;letter-spacing:5px;font-size:14px;text-shadow:0 0 12px rgba(63,180,255,.7)}
    /* open: camera moves inside — the whole vault zooms toward you + fades, revealing the panels */
    #introOverlay.vaulting-open{transform:scale(3.6);opacity:0;transition:transform 1.1s cubic-bezier(.6,0,.4,1),opacity 1.1s ease-in}
    #introSkip{position:absolute;bottom:max(22px,env(safe-area-inset-bottom));right:22px;z-index:5;
      background:rgba(8,8,10,.6);border:1px solid rgba(228,188,99,.4);color:#F7E8C0;
      padding:8px 16px;border-radius:999px;font-family:Assistant,system-ui,sans-serif;font-size:14px;cursor:pointer}
    #introOverlay.scanning #introSkip,#introOverlay.granted #introSkip,#introOverlay.vaulting #introSkip{opacity:0;pointer-events:none}
  </style>
  <script>
    (function(){
      var ov=document.getElementById('introOverlay'); if(!ov) return;
      document.documentElement.classList.add('booting');   // hide app + welcome until reveal
      var vid=document.getElementById('introVid'); var scanTxt=document.getElementById('scanTxt'); var done=false;
      function revealApp(){
        document.documentElement.classList.remove('booting');
        document.body.classList.add('revealed');   // panels animate in — only now
      }
      function removeOverlay(){
        ov.classList.add('gone');
        setTimeout(function(){ ov.parentNode && ov.parentNode.removeChild(ov); }, 800);
      }
      // video → face scan → ACCESS GRANTED → vault door opening (camera inside) → panels
      function sequence(){
        if(done) return; done=true;
        ov.classList.add('scanning');
        setTimeout(function(){ if(scanTxt) scanTxt.textContent='מזהה פנים…'; }, 550);
        setTimeout(function(){ ov.classList.remove('scanning'); ov.classList.add('granted'); }, 1350);
        setTimeout(function(){ ov.classList.remove('granted'); ov.classList.add('vaulting'); }, 2650);   // vault appears + spins
        setTimeout(function(){ revealApp(); ov.classList.add('vaulting-open'); }, 4100);                 // zoom inside, app fades in behind
        setTimeout(removeOverlay, 5300);
      }
      function skip(){ if(done) return; done=true; revealApp(); removeOverlay(); }
      document.getElementById('introSkip').addEventListener('click', skip);
      if(vid){
        vid.addEventListener('ended', sequence);
        vid.addEventListener('error', sequence);
        var pr=vid.play && vid.play();
        if(pr && pr.catch) pr.catch(function(){ /* autoplay blocked: skip / fallback handle it */ });
        setTimeout(sequence, 16000);   // hard fallback so it never gets stuck
      } else { sequence(); }
    })();
  </script>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
