name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only needs write access to push the built site to the gh-pages branch.
# Deliberately avoids the `github-pages` environment / deploy-pages action,
# which startup-fails unless the repo's Pages source is set to "GitHub Actions".
permissions:
  contents: write

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Disable Jekyll processing
        run: touch dist/.nojekyll
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
